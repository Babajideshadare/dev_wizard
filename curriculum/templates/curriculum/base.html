{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}Dev Wizard{% endblock %}</title>
    <link rel="stylesheet" href="{% static 'curriculum/css/style.css' %}">
</head>
<body>
    <header class="top-nav">
        <div class="nav-inner">
            <div class="nav-left">
                <a href="{% url 'curriculum:home' %}" class="logo">Dev Wizard</a>
            </div>
            <nav class="nav-links">
                <a href="{% url 'curriculum:home' %}">Curriculum</a>
                <a href="/category/capstone-projects/">Capstones</a>

                {% if request.user.is_authenticated %}
                    <a href="{% url 'accounts:profile' %}">Profile</a>
                    <a href="{% url 'accounts:logout' %}">Logout</a>
                {% else %}
                    <a href="{% url 'accounts:login' %}">Login</a>
                    <a href="{% url 'accounts:register' %}">Register</a>
                {% endif %}
            </nav>
        </div>
    </header>

    <main class="page-main">
        <div class="container">
            {% block content %}
            {% endblock %}
        </div>
    </main>

    <footer class="page-footer">
        <div class="container">
            <p>Dev Wizard &copy; {{ now|default:'' }}</p>
        </div>
    </footer>
</body>
</html>
