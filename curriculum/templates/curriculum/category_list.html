<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>dev_wizard - Categories</title>
</head>
<body>
    <h1>dev_wizard Curriculum Categories</h1>
    <p>Select a category to explore its topics.</p>

    {% if categories %}
        <ul>
            {% for category in categories %}
                <li>
                    {{ category.name }}
                </li>
            {% endfor %}
        </ul>
    {% else %}
        <p>No categories found.</p>
    {% endif %}
</body>
</html>
